<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atividade três</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <p>Exercício 1</p>

    <div class="fundo">
      <div class="amarelo">Bloco 1</div>
      <div class="flex">
        <div>
          <div class="flex">
            <div class="amarelo">Bloco 2</div>
            <div class="amarelo">Bloco 3</div>
          </div>
          <div class="amarelo">Bloco 4</div>
        </div>
        <div class="amarelo">Bloco 5</div>
      </div>
    </div>

    <p>Exercício 2</p>

    <div class="fundo">
      <div class="flex">
        <div class="amarelo">Bloco 1</div>
        <div class="amarelo">Bloco 2</div>
        <div class="amarelo">Bloco 3</div>
      </div>
      <div class="amarelo">Bloco 4</div>
      <div class="flex">
        <div class="amarelo alongar">Bloco 5</div>
        <div class="amarelo">Bloco 6</div>
      </div>
    </div>

    <p>Exercício 3</p>

    <div class="fundo">
      <div class="flex">
        <div class="amarelo esticado">Bloco 1</div>
        <div>
          <div class="amarelo">Bloco 2</div>
          <div class="flex">
            <div class="amarelo esticar">Bloco 3</div>
            <div class="amarelo esticar">Bloco 4</div>
          </div>
        </div>
      </div>
    </div>

    <p>Exercício 4</p>

    <div class="fundo">
      <div class="flex">
        <div class="amarelo esticar">Bloco 1</div>
        <div>
          <div class="amarelo">Bloco 2</div>
          <div class="amarelo esticar">Bloco 3</div>
        </div>
        <div class="flex">
          <div class="amarelo esticar">Bloco 4</div>
        </div>
      </div>
    </div>

    <p>Ecercício 5</p>
    <div class="fundo">
            <div class="flex">
                <div class="amarelo">Bloco 1</div>
                <div class="amrelo">Bloco 2</div>
            </div>
            <div class="amarelo">Bloco 3</div>
            <div class="amarelo esticar">Bloco 4</div>
    </div>


  </body>
</html>
